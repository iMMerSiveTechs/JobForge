name: EAS Build & Update

on:
  # OTA update on every push to claude/ branches (AI-authored changes)
  push:
    branches:
      - 'claude/**'
  # Full native build + submit on demand
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - ios
          - android
      profile:
        description: 'Build profile'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - preview
          - development
      submit:
        description: 'Auto-submit to App Store / Play Store?'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  # ── OTA update on every push to claude/* ─────────────────────────────────────
  eas-update:
    name: EAS Update (OTA)
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish OTA update to production channel
        run: |
          eas update \
            --branch production \
            --message "Auto-update from ${{ github.ref_name }} @ ${{ github.sha }}" \
            --non-interactive

  # ── Full native build + optional submit (manual trigger) ─────────────────────
  eas-build:
    name: EAS Build (${{ github.event.inputs.platform }}) [${{ github.event.inputs.profile }}]
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build on EAS (with auto-submit)
        if: github.event.inputs.submit == 'true'
        run: |
          eas build \
            --platform ${{ github.event.inputs.platform }} \
            --profile ${{ github.event.inputs.profile }} \
            --auto-submit \
            --non-interactive

      - name: Build on EAS (without submit)
        if: github.event.inputs.submit == 'false'
        run: |
          eas build \
            --platform ${{ github.event.inputs.platform }} \
            --profile ${{ github.event.inputs.profile }} \
            --non-interactive
