name: EAS Build / Update

on:
  # Full native build on manual trigger only
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'ios'
        type: choice
        options:
          - ios
          - android
          - all
      profile:
        description: 'Build profile'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - preview
          - development
      auto_submit:
        description: 'Auto-submit to App Store / Play Store after build?'
        required: true
        default: false
        type: boolean

jobs:
  # ── Full native build on manual trigger ──────────────────────────────────────
  build-manual:
    name: EAS Build (${{ inputs.platform }})
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Write App Store Connect API Key
        if: inputs.platform == 'ios' || inputs.platform == 'all'
        run: |
          mkdir -p $HOME/private_keys
          echo "${{ secrets.ASC_API_KEY_P8 }}" > $HOME/private_keys/AuthKey.p8
          echo "EXPO_ASC_API_KEY_PATH=$HOME/private_keys/AuthKey.p8" >> $GITHUB_ENV

      - name: Build on EAS (with auto-submit)
        if: inputs.auto_submit == true
        env:
          EXPO_ASC_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          EXPO_ASC_ISSUER_ID: ${{ secrets.ASC_API_KEY_ISSUER_ID }}
          EXPO_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          EXPO_APPLE_TEAM_TYPE: ${{ secrets.APPLE_TEAM_TYPE }}
        run: eas build --platform ${{ inputs.platform }} --profile ${{ inputs.profile }} --auto-submit --non-interactive

      - name: Build on EAS (no submit)
        if: inputs.auto_submit != true
        env:
          EXPO_ASC_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          EXPO_ASC_ISSUER_ID: ${{ secrets.ASC_API_KEY_ISSUER_ID }}
          EXPO_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          EXPO_APPLE_TEAM_TYPE: ${{ secrets.APPLE_TEAM_TYPE }}
        run: eas build --platform ${{ inputs.platform }} --profile ${{ inputs.profile }} --non-interactive
